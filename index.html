<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JMD Traders Sale</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/LX7dp7Zv/Traders.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d0e12; --card: #1a1b1f; --primary: #f1c40f; --secondary: #2ecc71; --error: #e74c3c; --info: #3498db; --text: #f5f6fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        /* New Navigation Bar */
        nav { display: flex; justify-content: space-around; background: #16171b; padding: 15px 0; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        nav button { background: none; border: none; color: #777; font-weight: 900; font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        nav button.active { color: var(--primary); transform: scale(1.1); border-bottom: 2px solid var(--primary); padding-bottom: 5px; }

        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .app-section { display: none; animation: fadeIn 0.3s ease; }
        .app-section.active { display: block; }

        /* Your Original Styles Integrated */
        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.3rem; letter-spacing: 1px; }
        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .summary-box { background: #1e2025; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .summary-box h4 { margin: 0 0 5px; font-size: 0.75rem; color: #999; text-transform: uppercase; }
        .summary-box span { font-size: 1.1rem; font-weight: 800; }
        .shop-card { background: var(--card); padding: 15px; border-radius: 12px; border-left: 4px solid var(--primary); margin-bottom: 15px; border-top: 1px solid #333; border-right: 1px solid #333; }
        .shop-card h3 { color: var(--primary); margin: 0 0 12px; font-size: 0.95rem; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .input-row { margin-bottom: 10px; }
        .input-row label { display: block; font-size: 0.8rem; color: #bbb; margin-bottom: 3px; font-weight: 900; }
        .input-row input, textarea { width: 100%; padding: 12px; background: #26272d; border: 1px solid #3d3e42; border-radius: 8px; color: white; box-sizing: border-box; font-weight: 900; font-size: 0.9rem; }
        .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; border: none; font-size: 0.85rem; transition: 0.2s; }
        .btn-save { background: var(--primary); color: #000; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-sync { background: #333; color: white; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 600px; font-weight: 900; }
        th { text-align: left; padding: 12px; background: #25262b; color: var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #2a2b30; }
        .breakdown-box { font-size: 0.65rem; color: #888; margin-top: 5px; border-top: 1px solid #333; padding-top: 5px; line-height: 1.4; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <button onclick="showSection('entry', this)" class="active">🏠 Entry</button>
    <button onclick="showSection('history', this)">📜 History</button>
    <button onclick="showSection('analytics', this)">📊 Reports</button>
</nav>

<div class="container">
    <div class="header"><h1>JMD TRADERS</h1></div>

    <section id="entry" class="app-section active">
        <div class="shop-card" style="border-left-color: #00ccff;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h3 style="color: #00ccff; font-weight: 900; text-transform: uppercase; margin: 0; font-size: 1rem;">Select Date:</h3>
                <input type="date" id="entryDate" onchange="autoFillOpeningCash()" style="flex-grow: 1; border: 2px solid var(--primary); background: #1a1b1f; color: white; border-radius: 6px; text-align: center;">
            </div>
            <div id="dateAlert" style="color: var(--error); font-size: 0.8rem; font-weight: 900; display: none; text-align: center; margin-top: 10px;"></div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;">
            <div class="shop-card">
                <h3>Sankat Mochan</h3>
                <div class="input-row"><label>Opening Cash</label><input type="number" id="s1_open"></div>
                <div class="input-row"><label>To Home</label><input type="number" id="s1_home"></div>
                <div class="input-row"><label>Closing</label><input type="number" id="s1_close"></div>
                <div class="input-row"><label>Counter Exp</label><input type="number" id="s1_exp"></div>
                <div class="input-row"><label>GPay Sale</label><input type="number" id="s1_gpay"></div>
            </div>
            <div class="shop-card">
                <h3>JMD Pooja Bhandar</h3>
                <div class="input-row"><label>Opening Cash</label><input type="number" id="s2_open"></div>
                <div class="input-row"><label>To Home</label><input type="number" id="s2_home"></div>
                <div class="input-row"><label>Closing</label><input type="number" id="s2_close"></div>
                <div class="input-row"><label>Counter Exp</label><input type="number" id="s2_exp"></div>
                <div class="input-row"><label>GPay Sale</label><input type="number" id="s2_gpay"></div>
            </div>
        </div>

        <div class="shop-card" style="border-left-color: var(--error);">
            <h3 style="color: var(--error);">Daily Expense (C, H, GP)</h3>
            <div class="input-row"><label>Expense Details:</label><textarea id="exp_details" rows="2" placeholder="From Counter C1, C2..."></textarea></div>
            <div class="input-row"><label>Expenses from Home:</label><input type="number" id="jeb_pay_out"></div>
            <div class="input-row"><label>Expenses from Gpay:</label><input type="number" id="gpay_exp"></div>
        </div>

        <div class="actions">
            <div class="button-row">
                <button id="saveBtn" class="btn-save" onclick="saveEntry()">SAVE DATA</button>
                <button class="btn-whatsapp" onclick="shareToWhatsApp()">WHATSAPP</button>
            </div>
            <div class="button-row">
                <button class="btn-sync" onclick="exportData()">⎘ EXPORT</button>
                <button class="btn-sync" onclick="document.getElementById('fileIn').click()">⎘ IMPORT</button>
            </div>
            <input type="file" id="fileIn" style="display:none" onchange="importData(event)">
        </div>
    </section>

    <section id="history" class="app-section">
        <div class="shop-card" style="overflow-x: auto; padding: 5px;">
            <table>
                <thead>
                    <tr><th>Date</th><th>Sale</th><th>Savings (C/B)</th><th>Net Cash</th><th>Exp/Out</th><th>X</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </section>

    <section id="analytics" class="app-section">
        <div class="summary-grid">
            <div class="summary-box"><h4>Monthly Sale</h4><span id="monSale">₹0</span></div>
            <div class="summary-box"><h4>Net Cash (Home)</h4><span id="monNet" style="color:var(--primary)">₹0</span></div>
            <div class="summary-box"><h4>Cash Sav (40%)</h4><span id="monCash" style="color:var(--secondary)">₹0</span></div>
            <div class="summary-box"><h4>Bank Sav (40%)</h4><span id="monBank" style="color:var(--info)">₹0</span></div>
            <div class="summary-box" style="grid-column: span 2; border-color: var(--error);"><h4>Monthly Exp</h4><span id="monExp" style="color:var(--error)">₹0</span></div>
        </div>
        <div class="shop-card"><canvas id="salesChart" height="250"></canvas></div>
    </section>

    <div class="app-footer">
        <div class="footer-text">© 2026 JMD Traders. Designed by Animesh Verma</div>
    </div>
</div>

<div id="customDialog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; align-items:center; justify-content:center;">
    <div style="background:#1a1b1f; padding:25px; border-radius:15px; border:1px solid #333; text-align:center; width:90%; max-width:300px;">
        <h3 style="color:#e74c3c; margin:0;">Delete Entry?</h3>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeDialog()" style="flex:1; background:#333; color:white;">Nahi</button>
            <button onclick="confirmDelete()" style="flex:1; background:#e74c3c; color:white;">Haan</button>
        </div>
    </div>
</div>

<script>
    // --- APP STATE & NAVIGATION ---
    const dateIn = document.getElementById('entryDate');
    const today = new Date().toISOString().split('T')[0];
    dateIn.value = today;
    dateIn.max = today;
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyuIgJpUnkBegcB1lRxZkEB7F4WPRWKwvX9BuOVFwZV0Nq2lBheDG5QSYVeJVcmyZClPA/exec';
    let history = JSON.parse(localStorage.getItem('jmd_traders_v5')) || [];
    let myChart;

    function showSection(id, btn) {
        document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'analytics') updateChart();
        if(id === 'history') renderApp();
    }

    // --- YOUR ORIGINAL LOGIC (UNTOUCHED) ---
    async function fetchSheetData() {
        showToast("Syncing with Sheets... 🔄");
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            if (data && data.length > 0) {
                history = data.map(item => ({ ...item, id: Date.now() + Math.random() }));
                renderApp();
                showToast("Sync Complete! ✅");
            }
        } catch (e) { showToast("Offline Mode Active."); }
    }

    function autoFillOpeningCash() {
        let d = new Date(dateIn.value);
        d.setDate(d.getDate() - 1);
        const prevDate = d.toISOString().split('T')[0];
        const prev = history.find(h => h.date === prevDate);
        if (prev) {
            document.getElementById('s1_open').value = prev.s1_close || "";
            document.getElementById('s2_open').value = prev.s2_close || "";
            showToast("Opening Cash Loaded! 💰");
        }
        validateForm();
    }

    function shareToWhatsApp() {
        const v = (id) => parseFloat(document.getElementById(id).value) || 0;
        const s1Cash = (v('s1_close') + v('s1_home') + v('s1_exp')) - v('s1_open');
        const s2Cash = (v('s2_close') + v('s2_home') + v('s2_exp')) - v('s2_open');
        const totalSale = s1Cash + v('s1_gpay') + s2Cash + v('s2_gpay');
        const cashSav = Math.round(((s1Cash + s2Cash) * 0.40) / 100) * 100;
        const netJeb = (v('s1_home') + v('s2_home')) - cashSav - v('jeb_pay_out');

        const msg = `*JMD TRADERS - Report*%0ADate: ${dateIn.value}%0A*Total Sale: ₹${totalSale.toLocaleString()}*%0A*Net Cash: ₹${netJeb.toLocaleString()}*`;
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    async function saveEntry() {
        const v = (id) => parseFloat(document.getElementById(id).value) || 0;
        const entryData = {
            date: dateIn.value,
            sale: (v('s1_home') + v('s1_close') + v('s1_exp')) - v('s1_open') + (v('s2_home') + v('s2_close') + v('s2_exp')) - v('s2_open') + v('s1_gpay') + v('s2_gpay'),
            cash: Math.round((((v('s1_home') + v('s1_close') + v('s1_exp')) - v('s1_open') + (v('s2_home') + v('s2_close') + v('s2_exp')) - v('s2_open')) * 0.40) / 100) * 100,
            bank: Math.round(((v('s1_gpay') + v('s2_gpay')) * 0.40) / 100) * 100,
            netCash: (v('s1_home') + v('s2_home')) - Math.round((((v('s1_home') + v('s1_close') + v('s1_exp')) - v('s1_open') + (v('s2_home') + v('s2_close') + v('s2_exp')) - v('s2_open')) * 0.40) / 100) * 100 - v('jeb_pay_out'),
            totalExp: v('s1_exp') + v('s2_exp') + v('gpay_exp'),
            jebOut: v('jeb_pay_out')
        };

        showToast("Saving... ⏳");
        try {
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(entryData) });
            history.push({...entryData, id: Date.now()});
            localStorage.setItem('jmd_traders_v5', JSON.stringify(history));
            renderApp();
            showToast("SAVED! ✅");
        } catch (e) { showToast("Error Saving! ❌"); }
    }

    function renderApp() {
        const sorted = [...history].sort((a,b) => new Date(b.date) - new Date(a.date));
        document.getElementById('historyBody').innerHTML = sorted.map(h => `
            <tr>
                <td>${h.date}</td>
                <td>₹${h.sale}</td>
                <td><span style="color:var(--secondary)">C:${h.cash}</span><br><span style="color:var(--info)">B:${h.bank}</span></td>
                <td><b style="color:${h.netCash < 0 ? 'var(--error)' : 'var(--primary)'}">₹${h.netCash}</b></td>
                <td>Exp: ${h.totalExp}</td>
                <td><button onclick="openDialog(${h.id})" style="color:red; background:none; border:1px solid red; padding:2px 5px;">X</button></td>
            </tr>
        `).join('');
        
        // Update Monthly Totals
        const totals = history.reduce((acc, c) => ({ sale: acc.sale + c.sale, net: acc.net + c.netCash, exp: acc.exp + c.totalExp }), {sale:0, net:0, exp:0});
        document.getElementById('monSale').innerText = "₹" + totals.sale.toLocaleString();
    }

    function updateChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        const last7 = [...history].sort((a,b) => new Date(a.date) - new Date(b.date)).slice(-7);
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: last7.map(h => h.date.split('-').reverse().slice(0,2).join('/')),
                datasets: [{ label: 'Sale', data: last7.map(h => h.sale), borderColor: '#f1c40f', fill: true }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function showToast(msg) {
        let t = document.getElementById('toast') || document.createElement('div');
        t.id = 'toast'; t.innerText = msg;
        t.style = "position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1a1b1f; color:#f1c40f; padding:10px 20px; border-radius:50px; border:1px solid #f1c40f; z-index:9999;";
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function validateForm() {
        const exists = history.some(h => h.date === dateIn.value);
        document.getElementById('dateAlert').style.display = exists ? 'block' : 'none';
        document.getElementById('dateAlert').innerText = "⚠️ Entry already exists!";
        document.getElementById('saveBtn').disabled = exists;
    }

    let pendingDeleteId = null;
    function openDialog(id) { pendingDeleteId = id; document.getElementById('customDialog').style.display = "flex"; }
    function closeDialog() { document.getElementById('customDialog').style.display = "none"; }
    function confirmDelete() {
        history = history.filter(x => x.id !== pendingDeleteId);
        localStorage.setItem('jmd_traders_v5', JSON.stringify(history));
        renderApp(); closeDialog();
    }

    document.addEventListener('DOMContentLoaded', () => { fetchSheetData(); renderApp(); });
</script>
</body>
</html>
