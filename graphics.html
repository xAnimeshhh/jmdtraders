<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMD Traders - Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Tera purana navbar aur loader ka CSS yahan paste kar dena */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #fff;
            text-align: center;
            color: #800020;
        }

        .coming-soon-box {
            padding: 20px;
        }

        .coming-soon-box i {
            font-size: 60px;
            margin-bottom: 20px;
            color: #ccc;
        }

        .coming-soon-box h1 {
            margin: 10px 0;
            font-size: 24px;
        }

        .coming-soon-box p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .back-btn {
            padding: 12px 25px;
            background: #800020;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(128, 0, 32, 0.3);
        }
        :root {
    --wine: #800020;
    --nav-bg: #f8f9fa; /* Page se alag light grey background */
    --pill-active: #ffebf0; /* Active icon ka background */
}

.app-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    border-top: 1px solid #ddd;
    box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
    z-index: 10000;
}

.nav-item {
    flex: 1;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #555;
    transition: 0.3s;
}

/* Pill Shape Logic */
.icon-pill {
    padding: 4px 20px;
    border-radius: 20px;
    margin-bottom: 4px;
    transition: 0.3s;
    font-size: 18px;
}

/* Active State - Page Change par automatically differentiate karega */
.nav-item.active .icon-pill {
    background: var(--pill-active);
    color: var(--wine);
}

.nav-item.active span {
    color: var(--wine);
    font-weight: 800;
}

/* Loading Spinner Animation */
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

body { padding-bottom: 80px; }
.logo-wrapper {
    position: relative;
    width: 150px; /* Size thoda bada kiya hai clear dikhne ke liye */
    height: 150px;
    margin-bottom: 20px;
}

.logo-base {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
    opacity: 0.8; /* Grey waala thoda sa soft dikhega */
}

.logo-anim {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    /* Niche se upar clipping ka logic */
    clip-path: inset(100% 0 0 0); 
    animation: customFill 2.5s ease-in-out infinite;
}

@keyframes customFill {
    0% {
        clip-path: inset(100% 0 0 0);
    }
    60% {
        clip-path: inset(0% 0 0 0);
    }
    80% {
        clip-path: inset(0% 0 0 0);
        opacity: 1;
    }
    100% {
        clip-path: inset(0% 0 0 0);
        opacity: 0; /* Smooth fade out transition */
    }
}

.loading-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: #800020; /* Wine Color */
    letter-spacing: 1.5px;
    text-align: center;
    animation: textPulse 1.5s infinite;
}

@keyframes textPulse {
    0%, 100% { opacity: 0.4; transform: scale(0.98); }
    50% { opacity: 1; transform: scale(1); }
}.app-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60px; /* Pehle 70px tha, ab 60px hai */
    background: #f8f9fa;
    display: flex;
    align-items: center;
    border-top: 1px solid #ddd;
    box-shadow: 0 -3px 8px rgba(0,0,0,0.05);
    z-index: 10000;
}

.nav-item {
    flex: 1;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #64748b;
    transition: 0.3s;
}

.icon-pill {
    padding: 2px 16px; /* Padding kam ki hai */
    border-radius: 15px;
    margin-bottom: 2px;
    transition: 0.2s;
    font-size: 16px; /* Icon size chhota kiya */
}

.nav-item span {
    font-size: 9px; /* Font size chhota kiya */
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}

/* Active State */
.nav-item.active .icon-pill {
    background: #ffebf0; /* Soft Wine tint */
    color: #800020;
}

.nav-item.active span {
    color: #800020;
}
        /* Navbar CSS niche chipka dena jo pehle di thi */
    </style>
</head>
<body>

    <div class="coming-soon-box">
        <i class="fa-solid fa-tools"></i>
        <h1>JMD TRADERS - Jai Mata Di</h1>
        <p>Bhai, ye page abhi under construction hai.<br>Jald hi live hoga!</p>
        <a href="index.html" class="back-btn">Back to Billing</a>
    </div>
<div id="logo-fill-loader" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#ffffff; z-index:20000; flex-direction:column; align-items:center; justify-content:center;">
    <div class="logo-wrapper">
        <img src="https://i.postimg.cc/XY9SVnkf/grey.png" class="logo-base">
        <img src="https://i.postimg.cc/D0JzRh6x/download.png" class="logo-anim">
    </div>
</div>
<nav class="app-nav">
    <a href="home.html" class="nav-item" onclick="showLoader(event, 'home.html')">
        <div class="icon-pill"><i class="fa-solid fa-house-chimney"></i></div>
        <span>Home</span>
    </a>

    <a href="invoice.html" class="nav-item " onclick="showLoader(event, 'invoice.html')">
        <div class="icon-pill"><i class="fa-solid fa-file-invoice-dollar"></i></div>
        <span>Invoice</span>
    </a>

    <a href="index.html" class="nav-item" onclick="showLoader(event, 'index.html')">
        <div class="icon-pill"><i class="fa-solid fa-chart-line"></i></div>
        <span>Sales</span>
    </a>

    <a href="dashboard.html" class="nav-item" onclick="showLoader(event, 'dashboard.html')">
        <div class="icon-pill"><i class="fa-solid fa-bar-chart"></i></div>
        <span>Dashboard</span>
    </a>

    <a href="graphics.html" class="nav-item" onclick="showLoader(event, 'graphics.html')">
        <div class="icon-pill"><i class="fa-solid fa-crown"></i></div>
        <span>Graphics</span>
    </a>
</nav>

<script>function showLoader(event, url) {
    event.preventDefault();
    
    const loader = document.getElementById('logo-fill-loader');
    if (loader) {
        loader.style.display = 'flex';
    }

    const isSamePage = window.location.href.includes(url);

    // Agar same page hai toh thoda lamba animation dikhao fir refresh karo
    if (isSamePage) {
        setTimeout(() => {
            window.location.reload();
        }, 1500); 
    } else {
        setTimeout(() => {
            window.location.href = url;
        }, 600);
    }
}

window.addEventListener('load', () => {
    const loader = document.getElementById('logo-fill-loader');
    if (loader) loader.style.display = 'none';
    
    // AUTO-ACTIVE LOGIC
    let currentPath = window.location.pathname.split("/").pop();
    
    // Agar path khali hai toh iska matlab index.html khula hai
    if (currentPath === "") currentPath = "index.html"; 

    const navItems = document.querySelectorAll('.nav-item');

    navItems.forEach(item => {
        const itemHref = item.getAttribute('href');
        if (currentPath === itemHref) {
            item.classList.add('active');
        } else {
            item.classList.remove('active');
        }
    });
});</script>
</body>
</html>
